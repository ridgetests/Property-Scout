name: scout

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          HOMEDATA_API_KEY: ${{ secrets.HOMEDATA_API_KEY }}
        run: python run.py

      - name: Commit results
        run: |
          git config user.name "scout-bot"
          git config user.email "scout-bot@users.noreply.github.com"
          git add data/scout.db docs/properties.json
          git commit -m "scout update" || echo "no changes"
          git push
