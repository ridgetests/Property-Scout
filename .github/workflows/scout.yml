name: scout
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pipeline
        env:
          HOMEDATA_API_KEY: ${{ secrets.HOMEDATA_API_KEY }}
          EPC_API_KEY: ${{ secrets.EPC_API_KEY }}
        run: python run.py
      - name: Commit results (keeps the price-history database)
        run: |
          git config user.name "scout-bot"
          git config user.email "scout-bot@users.noreply.github.com"
          git add data/scout.db docs/properties.json
          git commit -m "scout update" || echo "no changes"
          git push || echo "push skipped"
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
  deploy:
    needs: run
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
