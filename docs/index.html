<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<title>PropertyScout</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1c1c1a"/>
<link rel="apple-touch-icon" href="icon-180.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Scout"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  :root{
    --bg:#FAFAFA; --surface:#fff; --line:#e7e5e0; --line2:#d6d3cc;
    --ink:#1c1c1a; --muted:#6b6a66; --hint:#9a988f;
    --g:#16a34a; --a:#d97706; --gr:#94a3b8;
    --flag-bg:#FAEEDA; --flag-ink:#854F0B;
    --eq-bg:#EAF3DE; --eq-ink:#3B6D11; --eq-num:#27500A;
    --src-bg:#EEEDFE; --src-ink:#534AB7;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;background:var(--bg);color:var(--ink);overscroll-behavior:none}
  .lock{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
  .lockbox{width:100%;max-width:300px;text-align:center}
  .lockbox h2{margin:0 0 4px;font-size:22px}
  .lockbox p{color:var(--muted);margin:0 0 16px;font-size:14px}
  .lockbox input{width:100%;padding:13px;border:1px solid var(--line2);border-radius:10px;font-size:16px;margin-bottom:10px;box-sizing:border-box;background:var(--surface);color:var(--ink)}
  .lockbox button{width:100%;padding:13px;border:none;border-radius:10px;background:#0a84ff;color:#fff;font-size:15px;font-weight:600;cursor:pointer}
  .lockerr{color:#ff3b30;font-size:13px;margin-top:10px}
  header{background:var(--surface);border-bottom:.5px solid var(--line);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
  header h1{font-size:15px;font-weight:600;letter-spacing:-.01em}
  header .gen{font-size:11px;color:var(--hint)}
  .star-btn{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);position:relative;padding:4px}
  .star-btn .ct{position:absolute;top:-2px;right:-4px;background:var(--g);color:#fff;font-size:10px;font-weight:600;min-width:15px;height:15px;border-radius:8px;display:none;align-items:center;justify-content:center;padding:0 3px}
  .filters{background:var(--surface);border-bottom:.5px solid var(--line);padding:10px 16px;display:flex;flex-direction:column;align-items:stretch;gap:8px}
  .frow{display:flex;align-items:center;gap:10px}
  .frow label{flex:0 0 auto;width:66px;font-size:12px;color:var(--muted)}
  .frow input[type=range]{flex:1;min-width:0;accent-color:var(--ink)}
  .frow .fv{flex:0 0 auto;width:38px;text-align:right;font-size:12px}
  .frow.chips{gap:8px;flex-wrap:wrap}
  .frow.chips .sortsel{margin-left:auto}
  .filters label{font-size:12px;color:var(--muted);white-space:nowrap}
  .filters input[type=range]{flex:1;accent-color:var(--ink)}
  .fv{font-size:12px;font-weight:600;min-width:22px}
  .pill{font-size:11px;padding:5px 11px;border-radius:20px;border:.5px solid var(--line2);background:none;cursor:pointer;color:var(--muted)}
  .pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  #map{height:34vh;width:100%;background:#e8ede8;isolation:isolate;position:relative;z-index:0}
  .list{padding:10px 12px 90px;display:flex;flex-direction:column;gap:8px}
  .card{background:var(--surface);border:.5px solid var(--line);border-radius:12px;padding:12px;display:flex;gap:10px;cursor:pointer}
  .card.sel{border-color:var(--ink)}
  .ph{width:64px;height:82px;border-radius:8px;flex-shrink:0;position:relative;overflow:hidden;background:#e6e2d8;display:flex;align-items:center;justify-content:center}
  .ph img{width:100%;height:100%;object-fit:cover}
  .ph .src{position:absolute;top:3px;left:3px;background:var(--src-ink);color:#fff;font-size:8px;font-weight:600;padding:2px 4px;border-radius:4px;letter-spacing:.03em}
  .body{flex:1;min-width:0}
  .ctop{display:flex;justify-content:space-between;gap:6px;align-items:flex-start}
  .scol{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
  .typ{font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;white-space:nowrap;background:var(--line2);color:var(--ink)}
  .typ.tier-high{background:#16a34a;color:#fff}
  .typ.tier-medium{background:#d97706;color:#fff}
  .typ.tier-low{background:var(--line2);color:var(--muted)}
  .addr{font-size:13px;font-weight:600;line-height:1.3}
  .addr small{display:block;color:var(--muted);font-weight:400;font-size:12px}
  .sc{font-size:17px;font-weight:600;flex-shrink:0}
  .sub{font-size:12px;color:var(--muted);margin-top:3px}
  .eq{font-size:12px;font-weight:600;color:var(--g);margin-top:4px}
  .tags{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
  .tag{font-size:11px;padding:3px 8px;border-radius:20px;background:#f1efe8;color:var(--muted);white-space:nowrap}
  .tag.fl{background:var(--flag-bg);color:var(--flag-ink)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.open{opacity:1;pointer-events:all}
  .drawer{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-radius:16px 16px 0 0;z-index:1001;transform:translateY(100%);transition:transform .26s ease;max-height:90vh;overflow-y:auto;padding:0 16px 28px;z-index:1001}
  .drawer.open{transform:translateY(0)}
  .handle{width:44px;height:5px;border-radius:3px;background:var(--line2);margin:0 auto;cursor:pointer}
  .dhandle{position:sticky;top:0;z-index:5;background:var(--surface);padding:max(18px,env(safe-area-inset-top,18px)) 0 8px;margin:0 -16px;display:flex;justify-content:center;cursor:pointer}
  .dback{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#0a84ff;font-size:14px;font-weight:600;cursor:pointer;z-index:6;padding:4px 6px}
  .dh{padding:12px 0 10px;border-bottom:.5px solid var(--line)}
  .dh h2{font-size:16px;font-weight:600}
  .dh .m{font-size:13px;color:var(--muted);margin-top:3px}
  .dh .s{font-size:11px;color:var(--hint);margin-top:2px}
  .eqbox{background:var(--eq-bg);border-radius:10px;padding:12px;margin-top:14px}
  .eqbox .l{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--eq-ink);font-weight:600}
  .eqbox .n{font-size:24px;font-weight:600;color:var(--eq-num);margin-top:2px}
  .eqbox .b{font-size:11px;color:var(--eq-ink);margin-top:6px;line-height:1.5}
  .sl{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--hint);font-weight:600;margin:16px 0 8px}
  .row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .rn{font-size:12px;color:var(--muted);width:124px;flex-shrink:0}
  .bw{flex:1;height:6px;background:#f1efe8;border-radius:3px;overflow:hidden}
  .bf{height:100%;border-radius:3px}
  .rnum{font-size:12px;font-weight:600;min-width:34px;text-align:right}
  .note{font-size:11px;color:var(--hint);margin:0 0 10px 132px}
  .fstrip{display:flex;flex-wrap:wrap;gap:6px}
  .comps{display:flex;gap:8px;flex-wrap:wrap}
  .comp{flex:1;background:#f1efe8;border-radius:8px;padding:8px;font-size:11px}
  .comp b{font-size:13px;display:block;margin-bottom:2px}
  .comp span{color:var(--muted)}
  .acts{display:flex;gap:8px;margin-top:18px}
  .acts button{flex:1;padding:11px;border:.5px solid var(--line2);border-radius:8px;background:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;color:var(--ink);font-weight:500}
  .acts button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .panel{position:fixed;inset:0;background:var(--bg);z-index:1002;transform:translateX(100%);transition:transform .26s ease;overflow-y:auto}
  .panel.open{transform:translateX(0)}
  .ph-head{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:.5px solid var(--line);background:var(--surface)}
  .ph-head button{background:none;border:none;font-size:20px;cursor:pointer}
  .ph-head h2{font-size:15px;font-weight:600}
  .sl-item{padding:12px 16px;border-bottom:.5px solid var(--line)}
  .sl-item textarea{width:100%;margin-top:6px;font-size:12px;padding:6px 8px;border:.5px solid var(--line2);border-radius:6px;background:var(--surface);font-family:inherit;resize:none}
  .empty{padding:48px 24px;text-align:center;color:var(--muted);font-size:14px;line-height:1.6}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:12px;padding:9px 16px;border-radius:20px;z-index:1003;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}
  .why{font-size:11.5px;color:var(--a);margin-top:3px;font-weight:500;line-height:1.3}
.why{font-size:12.5px;color:var(--ink);font-weight:600;margin-top:4px;line-height:1.35}
  .sortsel{margin-left:auto;font-size:12px;padding:5px 8px;border:.5px solid var(--line2);border-radius:8px;background:var(--bg,#fff);color:var(--ink)}
  .hid{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px}
  .dismisslink{width:100%;margin-top:8px;padding:9px;border:none;background:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline}
.kf{margin:6px 0 12px;border:.5px solid var(--line2);border-radius:12px;overflow:hidden}
  .kfrow{display:flex;justify-content:space-between;gap:12px;padding:10px 12px;font-size:13px;border-bottom:.5px solid var(--line2)}
  .kfrow:last-child{border-bottom:none}
  .kfrow span{color:var(--muted)}
  .kfrow b{text-align:right;color:var(--ink);font-weight:600}
  .kfrow b .cmp{display:block;font-weight:500;font-size:11px;color:var(--muted);margin-top:1px}
  .aerial{width:100%;height:150px;object-fit:cover;border-radius:12px;margin:4px 0 2px}
  .aerialbox{position:relative;width:100%;margin:4px 0 2px;line-height:0}
  .aersvg{display:block;width:100%;aspect-ratio:1;border-radius:12px;background:#e3e3e3}
  .aerialbox .aerial{height:auto;object-fit:unset;margin:0;display:block}
  .aov{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
  .aov polygon{fill:rgba(255,205,0,.30);stroke:#ffcd00;stroke-width:2;vector-effect:non-scaling-stroke}
  .aerctl{display:flex;align-items:center;gap:10px;margin:8px 0 2px}
  .aerctl input[type=range]{flex:1}
  .aerhint{font-size:11px;color:var(--muted);white-space:nowrap}
  .ovbtn{width:100%;margin:8px 0 2px;padding:10px;border:.5px solid var(--line2);background:none;border-radius:10px;font-size:13px;color:var(--ink);cursor:pointer}

  .notes-ta{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:10px;padding:9px;font:inherit;font-size:13px;resize:vertical;background:#fffdf7;margin-top:2px}
  .addsheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(100%);width:100%;max-width:520px;background:#fff;border-radius:16px 16px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -6px 30px rgba(0,0,0,.2);z-index:60;transition:transform .25s ease}
  .addsheet.open{transform:translateX(-50%) translateY(0)}
  .addsheet h3{margin:0 0 12px;font-size:16px}
  .addsheet input,.addsheet textarea{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:10px;padding:11px;font:inherit;font-size:14px;margin-bottom:9px;background:#fff}
  .addsheet .acts{display:flex;gap:8px;margin-top:4px}
  .addsheet .acts button{flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);background:#fff;font:inherit;font-weight:600;font-size:14px}
  .addsheet .acts button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .addbtn{background:none;border:none;font-size:24px;line-height:1;cursor:pointer;color:var(--ink);padding:4px 6px;font-weight:400}
  .tabs{display:flex;border-bottom:1px solid var(--line);margin:16px -16px 2px;padding:0 8px}
  .tab{flex:1;padding:11px 2px;font-size:11.5px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;text-align:center;line-height:1.25;cursor:pointer}
  .tab.active{color:var(--ink);border-bottom-color:var(--ink)}
  .tabpanel{display:none;padding-top:4px}
  .tabpanel.active{display:block}
  .tabthin{color:var(--muted);font-size:13px;padding:18px 4px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div id="lock" class="lock" style="display:none">
  <div class="lockbox">
    <h2>PropertyScout</h2>
    <p>Enter passcode</p>
    <input id="pc" type="password" inputmode="text" autocomplete="off" autocapitalize="none"
           onkeydown="if(event.key==='Enter')unlock()" placeholder="Passcode">
    <button onclick="unlock()">Unlock</button>
    <div id="lockerr" class="lockerr" style="display:none">Incorrect passcode</div>
  </div>
</div>
<header>
  <div><h1>PropertyScout</h1><div class="gen" id="gen"></div></div>
  <button class="addbtn" onclick="openAdd()" aria-label="Add a place">＋</button><button class="star-btn" onclick="openPanel()" aria-label="Shortlist">★<span class="ct" id="ct"></span></button>
</header>

<div class="filters">
  <div class="frow"><label>Min score</label>
    <input type="range" id="ms" min="0" max="100" value="30" oninput="render()"/>
    <span class="fv" id="mv">50</span></div>
  <div class="frow"><label>Within</label>
    <input type="range" id="md" min="1" max="25" value="25" oninput="render()"/>
    <span class="fv" id="dv">Any</span></div>
  <div class="frow chips">
  <button class="pill on" id="p-all" onclick="setFilter('all')">All</button>
  <button class="pill" id="p-low" onclick="setFilter('low')">Low comp</button>
  <select id="sort" class="sortsel" onchange="render()">
    <option value="score">Top score</option>
    <option value="dist">Nearest</option>
    <option value="price">Cheapest</option>
    <option value="days">Longest listed</option>
  </select>
  <button id="hid" class="hid" onclick="resetHidden()" style="display:none"></button>
  </div>
</div>

<div id="map"></div>
<div class="list" id="list"></div>

<div class="overlay" id="ov" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"><div class="dhandle" onclick="closeDrawer()"><div class="handle"></div><button class="dback" onclick="event.stopPropagation();closeDrawer()">‹ Back to list</button></div><div id="dc"></div></div>

<div class="panel" id="panel">
  <div class="ph-head"><button onclick="closePanel()">←</button><h2>Shortlist</h2></div>
  <div id="sl-body"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<div class="ov" id="addov" onclick="closeAdd()"></div>
<div class="addsheet" id="addsheet">
  <h3>Add a place</h3>
  <input id="a-url" type="url" placeholder="Paste listing URL (required)" inputmode="url">
  <input id="a-addr" type="text" placeholder="Label / address (optional)">
  <input id="a-price" type="number" placeholder="Guide price £ (optional)" inputmode="numeric">
  <input id="a-plot" type="number" placeholder="Plot size m² (optional)" inputmode="numeric">
  <textarea id="a-note" rows="2" placeholder="Note (optional)"></textarea>
  <div class="acts"><button class="primary" onclick="addPlace()">Add place</button><button onclick="closeAdd()">Cancel</button></div>
</div>
<script>
const FLAG_LABELS = {
  few_photos:"Few photos", no_floorplan:"No floor plan", plot_not_tagged:"Plot not tagged",
  priced_just_above:"Priced just above threshold", cash_buyers_only:"Cash buyers only",
  sold_as_seen:"Sold as seen", possible_extra_bed:"Possible extra bed"
};
const SIGNAL_LABELS = {
  equity_residual:"Equity / residual", plot_size:"Plot size", structural:"Structural potential",
  motivation:"Probate / seller", competition:"Low competition", location:"Location / schools"
};
const SRC_LABEL = {auction:"AUCTION","off-market":"OFF-MKT"};

let DATA=[], filter='all', selected=null, map, markers=[], HOME_FLOOR=null, HOME_PLOT=null, HOME_PLOT_M2=null;
let shortlist = JSON.parse(localStorage.getItem('ps_shortlist')||'[]');
let dismissed = new Set(JSON.parse(localStorage.getItem('ps_dismissed')||'[]'));
let notes = JSON.parse(localStorage.getItem('ps_notes')||'{}');
let manual = JSON.parse(localStorage.getItem('ps_manual')||'[]');
shortlist.forEach(x=>{ if(x&&x.note&&!notes[x.id]) notes[x.id]=x.note; });  // migrate old inline notes
function saveNotes(){ localStorage.setItem('ps_notes',JSON.stringify(notes)); }
function saveManual(){ localStorage.setItem('ps_manual',JSON.stringify(manual)); }
function saveShort(){ localStorage.setItem('ps_shortlist',JSON.stringify(shortlist)); }
function setNote(id,v){ v=(v||'').trim(); if(v) notes[id]=v; else delete notes[id]; saveNotes(); render&&render(); }
function switchTab(el,n){
  const dc=document.getElementById('dc'); if(!dc) return;
  dc.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===n));
  dc.querySelectorAll('.tabpanel').forEach((t,i)=>t.classList.toggle('active',i===n));
  const dr=document.getElementById('drawer'); if(dr) dr.scrollTop=0;
}
function allById(id){ return DATA.find(x=>x.id==id) || manual.find(x=>x.id==id) || null; }
function openById(id){ if(String(id).indexOf('man_')===0) openManual(id); else openDrawer(id); }

const sc = s => s>=62?'var(--g)':s>=48?'var(--a)':'var(--gr)';
function hd(p){const t=(p.property_type||'property').replace(/_/g,' ');return p.beds?`${p.beds} bed ${t}`:(t.charAt(0).toUpperCase()+t.slice(1));}
const k = n => '£'+Math.round(n/1000)+'k';

async function load(){
  try{
    const r = await fetch('https://ridgetests.github.io/Property-Scout/properties.json?t='+Date.now(),{cache:'no-store'});
    const j = await r.json();
    DATA = j.properties||[]; HOME_FLOOR = j.home_floor_m2||null; HOME_PLOT = j.home_plot_outline||null; HOME_PLOT_M2 = j.home_plot_m2||null;
    document.getElementById('gen').textContent =
      'Updated '+new Date(j.generated_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  }catch(e){ DATA=[]; }
  initMap(); render(); updateCount();
}

function initMap(){
  map = L.map('map',{zoomControl:false,attributionControl:false}).setView([51.21,-0.80],11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
}

function dom_(p){ return (p.enrichment&&p.enrichment.market&&p.enrichment.market.dom)||0; }
function visible(){
  const min = +document.getElementById('ms').value;
  const maxd = +(document.getElementById('md')||{}).value || 25;
  const so = (document.getElementById('sort')||{}).value || 'score';
  const arr = DATA.filter(p => !dismissed.has(p.id) && p.score>=min && (filter!=='low'||p.low_comp) && (maxd>=25 || (p.dist_mi!=null && p.dist_mi<=maxd)));
  const cmp = {
    score:(a,b)=>b.score-a.score,
    dist:(a,b)=>(a.dist_mi==null?99:a.dist_mi)-(b.dist_mi==null?99:b.dist_mi),
    price:(a,b)=>a.price-b.price,
    days:(a,b)=>dom_(b)-dom_(a)
  }[so] || ((a,b)=>b.score-a.score);
  return arr.sort(cmp);
}

function render(){
  document.getElementById('mv').textContent = document.getElementById('ms').value;
  {const mdv=+(document.getElementById('md')||{}).value||25; const de=document.getElementById('dv'); if(de) de.textContent = mdv>=25?'Any':mdv+' mi';}
  const hb=document.getElementById('hid');
  if(hb){ if(dismissed.size){hb.style.display='inline-block'; hb.textContent='↺ hidden '+dismissed.size;} else {hb.style.display='none';} }
  const v = visible(), L_ = document.getElementById('list');
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  v.forEach(p=>{
    if(p.lat&&p.lng){
      const col = p.score>=62?'#16a34a':p.score>=48?'#d97706':'#94a3b8';
      const ic = L.divIcon({className:'',html:`<div style="background:${col};color:#fff;font-size:11px;font-weight:600;padding:3px 7px;border-radius:12px;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25)">${p.score}</div>`,iconSize:[34,22],iconAnchor:[17,22]});
      const m = L.marker([p.lat,p.lng],{icon:ic}).addTo(map).on('click',()=>openDrawer(p.id));
      markers.push(m);
    }
  });
  // (manual + empty-feed handled below)
  const manHtml = manual.length ? '<div class="sl" style="margin:2px 0 6px">➕ Your added places</div>'+manual.map(manCard).join('') : '';
  L_.innerHTML = manHtml + (v.length?v.map(card).join(''):'<div class="empty" style="margin-top:10px">No feed properties match this filter.</div>');
}

function topReason(p){
  const sigs=p.signals||{}; let best=null,bestR=-1;
  for(const kk in sigs){const sg=sigs[kk]; if(!sg||!sg.note) continue;
    const r=sg.max?sg.score/sg.max:0; if(r>bestR){bestR=r;best=sg;}}
  return best?best.note:'';
}
function card(p){
  const eq = (p.enrichment&&p.enrichment.equity)||{};
  const src = p.source&&p.source.portal;
  const badge = SRC_LABEL[src] ? `<div class="src">${SRC_LABEL[src]}</div>` : '';
  const thumb = (p.media&&p.media.thumb_url) ? `<img src="${p.media.thumb_url}" alt=""/>` : '🏠';
  const tags = (p.flags||[]).slice(0,1).map(f=>`<span class="tag fl">${FLAG_LABELS[f]||f}</span>`).join('')
    + (notes[p.id]?'<span class="tag" style="background:#fef3c7;color:#92400e">✎ note</span>':'')
    + (shortlist.find(s=>s.id==p.id)?'<span class="tag" style="background:#fef9c3;color:#854d0e">★</span>':'');
  const dom = (p.enrichment&&p.enrichment.market&&p.enrichment.market.dom)||p.days_on_market||0;
  const days = dom>0 ? dom+' days listed' : 'just listed';
  return `<div class="card ${selected===p.id?'sel':''}" onclick="openDrawer('${p.id}')">
    <div class="ph">${badge}${thumb}</div>
    <div class="body">
      <div class="ctop"><div class="addr">${hd(p)}<small>${p.address}</small></div>
        <div class="scol">${p.typology?`<div class="typ tier-${(p.tier||'').toLowerCase()}">${p.typology}</div>`:''}<div class="sc" style="color:${sc(p.score)}">${p.score}</div></div></div>
      <div class="sub">${k(p.price)} · ${days}${p.dist_mi!=null?' · '+p.dist_mi+' mi':''}</div>
      ${(p.reasons&&p.reasons.length)?`<div class="why">${p.reasons.join(' · ')}</div>`:''}
      ${eq.equity_gain!=null?`<div class="eq">▲ ~${k(eq.equity_gain)} est. equity gain</div>`:''}
      <div class="tags">${tags}</div>
    </div></div>`;
}

function keyFacts(p){
  const ov=[], land=[], pv=[], con=[];
  // --- Overview: location, timing, status ---
  ov.push(`<div class="kfrow"><span>Location</span><b>${p.postcode||'\u2014'}${p.dist_mi!=null?` \u00b7 ${p.dist_mi} mi from home`:''}</b></div>`);
  if(p.market_window) ov.push(`<div class="kfrow"><span>Likely on market</span><b>${p.market_window}</b></div>`);
  if(p.owner_note) ov.push(`<div class="kfrow"><span>Status</span><b>${p.owner_note}</b></div>`);
  // --- Planning & Value: estimated value ---
  let val='';
  if(p.est_low&&p.est_high){
    const mid=p.est_mid||Math.round((p.est_low+p.est_high)/2);
    val=`~\u00a3${Math.round(mid/1000)}k <span class="cmp" style="display:inline">(\u00a3${Math.round(p.est_low/1000)}k\u2013\u00a3${Math.round(p.est_high/1000)}k)</span>`;
    let basis='';
    if(p.est_basis&&p.est_basis.indexOf('own')===0) basis=`${p.est_basis}`;
    else if(p.est_n) basis=`${p.est_n} ${p.est_basis_type||''} sales \u00b7 ${p.est_basis||'area'}`;
    if(basis) val+=`<span class="cmp">${basis}</span>`;
  }
  else if(p.price) val=`\u00a3${p.price.toLocaleString()}`;
  if(val) pv.push(`<div class="kfrow"><span>Est. value</span><b>${val}</b></div>`);
  // --- Land & Buildings: interior ---
  let interior='Awaiting EPC';
  if(!p.floor_area_m2 && p.floor_area_est_m2){ interior=`~${p.floor_area_est_m2} m\u00b2 (est. from footprint)`; }
  if(p.floor_area_m2){
    let cmp='';
    if(HOME_FLOOR){const d=Math.round((p.floor_area_m2/HOME_FLOOR-1)*100); cmp=`<span class="cmp">${d>=0?'+':''}${d}% vs your home (${HOME_FLOOR} m\u00b2)</span>`;}
    interior=`${p.floor_area_m2} m\u00b2 (~${Math.round(p.floor_area_m2*10.76)} sq ft)${cmp}`;
  }
  land.push(`<div class="kfrow"><span>Interior</span><b>${interior}</b></div>`);
  // --- Contact: estate contact / notice ---
  if(p.estate_contact && p.estate_contact.name){
    const c=p.estate_contact, lbl=c.kind==='solicitor'?'Solicitor':'Executor';
    const line=[c.postcode,
                c.phone?`<a href="tel:${c.phone.replace(/\s/g,'')}">${c.phone}</a>`:'',
                c.email?`<a href="mailto:${c.email}">${c.email}</a>`:''].filter(Boolean).join(' \u00b7 ');
    con.push(`<div class="kfrow"><span>Estate contact</span><b>${c.name}${line?' \u00b7 '+line:''}<span class="cmp">${lbl}${c.ref?' \u00b7 Ref '+c.ref:''} \u00b7 for a tactful pre-market enquiry</span></b></div>`);
  }
  else if(p.notice_sample){
    con.push(`<div class="kfrow"><span>Notice (debug)</span><b style="font-weight:400;font-size:12px">${p.notice_sample}</b></div>`);
  }
  // --- Land & Buildings: plot + buildings ---
  let ext='See aerial above', extcmp='Pull LR title (\u00a33) to confirm plot';
  if(p.plot_m2){
    let pc=''; if(HOME_PLOT_M2){const d=Math.round((p.plot_m2/HOME_PLOT_M2-1)*100); pc=` \u00b7 ${d>=0?'+':''}${d}% vs your plot`;}
    ext=`${p.plot_m2.toLocaleString()} m\u00b2 plot${pc}`; extcmp=`~${Math.round(p.plot_m2*10.764).toLocaleString()} sq ft \u00b7 HMLR indicative`;
  } else if(p.flags && p.flags.indexOf('plot-unverified')>=0){ ext='Plot not in INSPIRE \u2014 check overlay'; }
  land.push(`<div class="kfrow"><span>Exterior / plot</span><b>${ext}<span class="cmp">${extcmp}</span></b></div>`);
  if(p.footprints){
    const f=p.footprints, extra=f.buildings-1;
    let bl=`Main ~${f.main_m2} m\u00b2`;
    if(extra>0) bl+=` + ${extra} outbuilding${extra>1?'s':''} (largest ~${f.largest_secondary_m2} m\u00b2)`;
    const cov=f.coverage_pct!=null?`${f.coverage_pct}% plot coverage`:'';
    const conv=f.outbuilding==='large'?' \u00b7 possible conversion candidate':'';
    land.push(`<div class="kfrow"><span>Buildings</span><b>${bl}<span class="cmp">${cov}${conv}</span></b></div>`);
  }
  // --- Planning & Value: constraints + permission ---
  if(p.constraints){
    let cl = p.constraints.length ? p.constraints.join(' \u00b7 ') : 'No major constraints found';
    if(p.listed_grade) cl += ` (Grade ${p.listed_grade})`;
    pv.push(`<div class="kfrow"><span>Planning</span><b>${cl}<span class="cmp">coverage varies \u2014 verify</span></b></div>`);
  }
  if(p.permission!=null){
    const pct = Math.round(p.permission*100);
    const ph = p.planning||{};
    const ev = ph.decided ? `${ph.approved} approved / ${ph.refused} refused within 500m` : 'limited local record';
    const lbl = p.permission_label||'';
    pv.push(`<div class="kfrow"><span>Permission</span><b>~${pct}% ${lbl}<span class="cmp">${ev}</span></b></div>`);
  }
  const wrap=a=>a.length?`<div class="kf">${a.join('')}</div>`:'';
  return {overview:wrap(ov), land:wrap(land), planval:wrap(pv), contact:wrap(con)};
}
function tileXY(lat,lng,z){const n=2**z,xf=(lng+180)/360*n,yr=lat*Math.PI/180,yf=(1-Math.asinh(Math.tan(yr))/Math.PI)/2*n;return {x:Math.floor(xf),y:Math.floor(yf),fx:xf-Math.floor(xf),fy:yf-Math.floor(yf)};}
function tileImg(z,x,y){return `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${z}/${y}/${x}`;}
function tileGW(lat,z){return 256*156543.03392*Math.cos(lat*Math.PI/180)/(2**z);}
function setupOverlay(p){
  const svg=document.getElementById('aov'); if(!svg||p.lat==null) return;
  const z=18, GW=tileGW(p.lat,z), t=tileXY(p.lat,p.lng,z);
  svg.setAttribute('viewBox',`0 0 ${GW} ${GW}`);
  let parts='';
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    const sx=(GW/2 - t.fx*GW)+dx*GW, sy=(GW/2 - t.fy*GW)+dy*GW, u=tileImg(z,t.x+dx,t.y+dy);
    parts+=`<image href="${u}" xlink:href="${u}" x="${sx}" y="${sy}" width="${GW}" height="${GW}" />`;
  }
  const ppts = HOME_PLOT?HOME_PLOT.map(c=>`${(GW/2+c[0]).toFixed(2)},${(GW/2+c[1]).toFixed(2)}`).join(' '):'';
  parts+=`<g id="aovg" style="display:none"><polygon id="aovp" points="${ppts}" fill="rgba(255,205,0,.30)" stroke="#ffcd00" stroke-width="2" vector-effect="non-scaling-stroke"/></g>`;
  parts+=`<text x="${GW/2}" y="${(GW/2-GW*0.05).toFixed(2)}" text-anchor="middle" font-size="${(GW*0.035).toFixed(2)}" fill="#fff" stroke="#000" stroke-width="${(GW*0.006).toFixed(2)}" paint-order="stroke" font-weight="700">This property</text>`;
  parts+=`<circle cx="${GW/2}" cy="${GW/2}" r="${(GW*0.013).toFixed(2)}" fill="#ff3b30" stroke="#fff" stroke-width="${(GW*0.006).toFixed(2)}"/>`;
  svg.innerHTML = parts;
  const g=document.getElementById('aovg'),btn=document.getElementById('ovbtn'),ctl=document.getElementById('aerctl'),rot=document.getElementById('aovrot');
  if(!btn||!HOME_PLOT) return;
  let on=false,tx=0,ty=0,rdeg=0; if(rot)rot.value=0;
  const apply=()=>g.setAttribute('transform',`translate(${tx} ${ty}) rotate(${rdeg} ${GW/2} ${GW/2})`);
  btn.onclick=()=>{on=!on;g.style.display=on?'block':'none';ctl.style.display=on?'flex':'none';svg.style.touchAction=on?'none':'';btn.textContent=on?'⊖ Hide my plot':'⊕ Overlay my plot to scale';};
  if(rot) rot.oninput=()=>{rdeg=+rot.value;apply();};
  let drag=false,sx,sy;
  const toU=d=>{const r=svg.getBoundingClientRect();return d*(GW/r.width);};
  svg.addEventListener('pointerdown',e=>{if(!on)return;drag=true;sx=e.clientX;sy=e.clientY;try{svg.setPointerCapture(e.pointerId);}catch(_){}});
  svg.addEventListener('pointermove',e=>{if(!drag)return;tx+=toU(e.clientX-sx);ty+=toU(e.clientY-sy);sx=e.clientX;sy=e.clientY;apply();});
  svg.addEventListener('pointerup',()=>{drag=false;});
  apply();
}
function openDrawer(id){
  const p = DATA.find(x=>x.id==id); if(!p) return;
  selected = id; render();
  const eq=(p.enrichment&&p.enrichment.equity)||{}, saved=shortlist.find(s=>s.id==id);
  const sigs = Object.entries(p.signals||{}).map(([key,s])=>{
    const pc = Math.round(s.score/s.max*100);
    return `<div class="row"><span class="rn">${SIGNAL_LABELS[key]||key}</span>
      <div class="bw"><div class="bf" style="width:${pc}%;background:${sc(pc)}"></div></div>
      <span class="rnum">${s.score}/${s.max}</span></div>
      <p class="note">${s.note||''}</p>`;
  }).join('');
  let comps = '';
  if(p.local_comps&&p.local_comps.length){
    comps = p.local_comps.map(c=>`<div class="comp"><b>${k(c.adj||c.price)}</b><span>${c.addr}</span><span>sold ${k(c.price)} in ${c.year}</span></div>`).join('');
  } else {
    comps = (p.comps||[]).slice(0,3).map(c=>`<div class="comp"><b>${k(c.price)}</b><span>${c.renovated?'renovated · ':''}${c.m2}m²</span></div>`).join('');
  }
  const flags = (p.flags||[]).map(f=>`<span class="tag fl">${FLAG_LABELS[f]||f}</span>`).join('')
              + (p.low_comp?'<span class="tag" style="background:var(--eq-bg);color:var(--eq-ink)">Low competition</span>':'');
  const kf = keyFacts(p);
  const thin = 'More detail arrives with the next engine update.';
  document.getElementById('dc').innerHTML = `
    <div class="dh"><h2>${p.address}</h2>
      <div class="m">${'\u00a3'+p.price.toLocaleString()} \u00b7 ${hd(p)} \u00b7 ${((p.enrichment&&p.enrichment.market&&p.enrichment.market.dom)||p.days_on_market||0)>0?((p.enrichment&&p.enrichment.market&&p.enrichment.market.dom)||p.days_on_market)+' days on market':'just listed'}</div>
      <div class="s">${(p.source&&p.source.portal)||''} \u00b7 ${p.postcode||''}</div></div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab(this,0)">Overview</button>
      <button class="tab" onclick="switchTab(this,1)">Land &amp; Buildings</button>
      <button class="tab" onclick="switchTab(this,2)">Planning &amp; Value</button>
      <button class="tab" onclick="switchTab(this,3)">Contact</button>
    </div>

    <div class="tabpanel active">
      <div class="sl">${p.typology?p.typology+' \u00b7 '+(p.tier||'')+' \u00b7 ':'Score '}${p.score}/100</div>${sigs}
      ${flags?`<div class="sl">Search-invisibility flags</div><div class="fstrip">${flags}</div>`:''}
      ${kf.overview}
      <div class="sl">Your notes</div>
      <textarea class="notes-ta" rows="3" placeholder="Record what you learn \u2014 access, listing status, agent chat, gut feel\u2026" onchange="setNote('${id}',this.value)">${(notes[id]||'').replace(/</g,'&lt;')}</textarea>
    </div>

    <div class="tabpanel">
      <div class="aerialbox" id="abox">
        <svg class="aersvg" id="aov" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      ${HOME_PLOT?`<button class="ovbtn" id="ovbtn">\u2295 Overlay my plot to scale</button>
      <div class="aerctl" id="aerctl" style="display:none"><input type="range" min="0" max="359" value="0" id="aovrot"><span class="aerhint">Your plot (~${HOME_PLOT_M2} m\u00b2) \u00b7 drag &amp; rotate</span></div>`:''}
      ${kf.land || `<p class="tabthin">${thin}</p>`}
    </div>

    <div class="tabpanel">
      ${eq.equity_gain!=null?`<div class="eqbox"><div class="l">Est. equity gain after works</div>
        <div class="n">~\u00a3${eq.equity_gain.toLocaleString()}</div>
        <div class="b">Renovated comp ~\u00a3${(eq.renovated_comp||0).toLocaleString()} \u2212 asking \u00a3${p.price.toLocaleString()} \u2212 works ~\u00a3${(eq.reno_cost_est||0).toLocaleString()}</div></div>`:''}
      ${kf.planval || `<p class="tabthin">${thin}</p>`}
      ${comps?`<div class="sl">Nearby comparables</div><div class="comps">${comps}</div>`:''}
    </div>

    <div class="tabpanel">
      ${kf.contact || `<p class="tabthin">No contact details on file for this lead yet.</p>`}
      <div class="kf"><div class="kfrow"><span>Source</span><b>${(p.source&&(p.source.name||p.source.portal))||'\u2014'}${p.source_label?' \u00b7 '+p.source_label:''}</b></div></div>
    </div>

    <div class="acts">
      <button class="${saved?'primary':''}" onclick="toggleSave('${id}')">\u2605 ${saved?'Saved':'Save'}</button>

      <button onclick="viewListing('${id}')">\u2197 Find listing</button>
      ${p.streetview_url?`<button onclick="window.open('${p.streetview_url}','_blank')">\u2316 Street View</button>`:''}
    </div>
    <button class="dismisslink" onclick="dismiss('${id}')">Not for me \u2014 hide this</button>`;
  document.getElementById('ov').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  setupOverlay(p);
}
function closeDrawer(){selected=null;render();document.getElementById('ov').classList.remove('open');document.getElementById('drawer').classList.remove('open');}
function viewListing(id){
  const p = DATA.find(x=>x.id==id); if(!p) return;
  const u = p.source&&p.source.url;
  if(u && u!=='' && u!=='#'){ window.open(u,'_blank'); return; }
  const q = encodeURIComponent((p.address||'')+' for sale');
  window.open('https://www.google.com/search?q='+q,'_blank');
}

function toggleSave(id){
  const i = shortlist.findIndex(s=>s.id==id);
  if(i>-1){ shortlist.splice(i,1); toast('Removed'); }
  else {
    const p = allById(id);
    shortlist.push({id, addr:(p&&(p.address||p.url))||id,
                    price:(p&&p.price!=null)?p.price:null,
                    score:(p&&p.score!=null)?p.score:null, ts:Date.now()});
    toast('Added to shortlist ★');
  }
  saveShort(); updateCount(); openById(id);
}
function updateCount(){ const c=document.getElementById('ct'); c.textContent=shortlist.length; c.style.display=shortlist.length?'flex':'none'; }

function share(id){
  const p = DATA.find(x=>x.id==id), eq=(p.enrichment&&p.enrichment.equity)||{};
  const txt = `🏠 ${p.address} · £${p.price.toLocaleString()}\n`
    + `Score ${p.score}/100${eq.equity_gain!=null?' · ~'+k(eq.equity_gain)+' equity gain':''}\n`
    + `${hd(p)} · ${p.days_on_market} days\n`
    + ((p.source&&p.source.url)?p.source.url+'\n':'') + '\nVia PropertyScout';
  const wa = 'https://wa.me/?text='+encodeURIComponent(txt);
  window.open(wa,'_blank'); toast('Opening WhatsApp…');
}

function setFilter(f){ filter=f; document.getElementById('p-all').classList.toggle('on',f==='all'); document.getElementById('p-low').classList.toggle('on',f==='low'); render(); }
function openPanel(){ renderPanel(); document.getElementById('panel').classList.add('open'); }
function closePanel(){ document.getElementById('panel').classList.remove('open'); }
function renderPanel(){
  const b=document.getElementById('sl-body');
  if(!shortlist.length){ b.innerHTML='<div class="empty">Nothing saved yet.<br>Tap ★ on any property to shortlist it.</div>'; return; }
  b.innerHTML = shortlist.map(s=>{
    const p = allById(s.id);
    const isMan = String(s.id).indexOf('man_')===0;
    const addr = p ? (p.address||p.url||s.id) : (s.addr||s.id);
    const price = (p&&p.price!=null) ? p.price : (s.price!=null?s.price:null);
    const score = (p&&p.score!=null) ? p.score : (s.score!=null?s.score:null);
    const gone = p ? '' : ' <span style="color:var(--muted);font-size:11px">(not in current feed)</span>';
    const scHtml = score!=null ? `<div class="sc" style="color:${sc(score)}">${score}</div>` : '<div class="sc" style="color:var(--muted)">—</div>';
    return `<div class="sl-item"><div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1;cursor:pointer" onclick="closePanel();${isMan?`openManual('${s.id}')`:`openDrawer('${s.id}')`}">
        <div style="font-size:13px;font-weight:600">${addr}${gone}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">${price!=null?'£'+price.toLocaleString():'—'}${score!=null?' · Score '+score:(isMan?' · Manual':'')}</div></div>
      ${scHtml}</div>
      <textarea rows="2" placeholder="Add a note…" onchange="setNote('${s.id}',this.value)">${notes[s.id]||''}</textarea></div>`;
  }).join('');
}

    </div>`;
  document.getElementById('ov').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function delManual(id){
  manual=manual.filter(x=>x.id!=id); saveManual();
  const i=shortlist.findIndex(s=>s.id==id); if(i>-1){shortlist.splice(i,1);saveShort();}
  delete notes[id]; saveNotes();
  closeDrawer(); render(); updateCount(); toast('Removed');
}
function openAdd(){ document.getElementById('addov').classList.add('open'); document.getElementById('addsheet').classList.add('open'); }
function closeAdd(){ document.getElementById('addov').classList.remove('open'); document.getElementById('addsheet').classList.remove('open'); }
function addPlace(){
  const url=(document.getElementById('a-url').value||'').trim();
  if(!url){ toast('A URL is needed'); return; }
  const id='man_'+Date.now();
  manual.unshift({id, url,
    address:(document.getElementById('a-addr').value||'').trim(),
    price:+document.getElementById('a-price').value||null,
    plot_m2:+document.getElementById('a-plot').value||null, ts:Date.now()});
  const n=(document.getElementById('a-note').value||'').trim(); if(n){ notes[id]=n; saveNotes(); }
  saveManual();
  ['a-url','a-addr','a-price','a-plot','a-note'].forEach(x=>document.getElementById(x).value='');
  closeAdd(); render(); toast('Added ★ full scoring comes in a later update');
}
function _h(s){let h=5381;for(let i=0;i<s.length;i++)h=((h*33)^s.charCodeAt(i))>>>0;return h;}
const PASS_H=4157867882;
function unlock(){
  const v=document.getElementById('pc').value;
  if(_h(v)===PASS_H){ localStorage.setItem('ps_auth', String(PASS_H));
    document.getElementById('lock').style.display='none';
    if(!window._booted){window._booted=true; load();} }
  else { document.getElementById('lockerr').style.display='block'; }
}
function _gate(){
  if(localStorage.getItem('ps_auth')===String(PASS_H)){
    document.getElementById('lock').style.display='none'; window._booted=true; load();
  } else {
    document.getElementById('lock').style.display='flex';
    setTimeout(()=>{const e=document.getElementById('pc'); if(e) e.focus();},100);
  }
}
_gate();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}
